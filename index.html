<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Llibreta de Gimnàs — Bàsquet</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110f; --card:#1e1a17; --card2:#262019; --line:#332c26;
    --ink:#f3ece3; --muted:#a1968a; --faint:#6e655c;
    --accent:#ff7a2f; --accent-dim:#b85420; --accent-soft:rgba(255,122,47,.12);
    --ok:#74c98a; --ok-soft:rgba(116,201,138,.12);
    --danger:#e06c5a;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Barlow', -apple-system, system-ui, sans-serif;
    font-size:16px; line-height:1.4;
    padding-bottom:90px;
  }
  h1,h2,h3,.disp{font-family:'Barlow Condensed', -apple-system, sans-serif; letter-spacing:.02em;}

  /* ---------- capçalera ---------- */
  .top{
    padding:18px 16px 10px;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--bg); z-index:20;
  }
  .top .kicker{font-size:12px; color:var(--accent); text-transform:uppercase; letter-spacing:.18em; font-weight:600;}
  .top h1{margin:2px 0 0; font-size:26px; font-weight:800; text-transform:uppercase;}
  .top .sub{color:var(--muted); font-size:13px; margin-top:2px;}

  /* ---------- navegació inferior ---------- */
  .tabs{
    position:fixed; bottom:0; left:0; right:0; z-index:30;
    display:flex; background:var(--card); border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tabs button{
    flex:1; background:none; border:none; color:var(--faint);
    font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700;
    text-transform:uppercase; letter-spacing:.08em; padding:14px 0 12px;
  }
  .tabs button.active{color:var(--accent);}

  .wrap{padding:16px; max-width:560px; margin:0 auto;}

  /* ---------- targetes de dia ---------- */
  .daycard{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:12px; display:flex; align-items:center; gap:14px;
    cursor:pointer;
  }
  .daycard .dnum{
    font-family:'Barlow Condensed'; font-weight:800; font-size:24px;
    color:var(--accent); min-width:44px; height:44px; border-radius:10px;
    background:var(--accent-soft); display:flex; align-items:center; justify-content:center;
  }
  .daycard .dinfo{flex:1;}
  .daycard h3{margin:0; font-size:19px; text-transform:uppercase;}
  .daycard .focus{color:var(--muted); font-size:13px;}
  .daycard .arrow{color:var(--faint); font-size:20px;}

  .resume{
    background:linear-gradient(135deg, #2a1c10, #1e1a17);
    border:1px solid var(--accent-dim);
  }
  .resume .dnum{background:var(--accent); color:#14110f;}

  .resthint{color:var(--faint); font-size:13px; text-align:center; margin:14px 0 4px;}

  /* ---------- vista d'entreno ---------- */
  .progresswrap{margin:4px 0 16px;}
  .progressbar{height:8px; background:var(--card2); border-radius:99px; overflow:hidden;}
  .progressbar div{height:100%; background:var(--accent); width:0%; transition:width .3s; border-radius:99px;}
  .progresstxt{font-size:12px; color:var(--muted); margin-top:5px; display:flex; justify-content:space-between;}

  .block{margin-bottom:22px;}
  .blockhead{display:flex; align-items:baseline; gap:10px; margin-bottom:4px;}
  .blockhead .bletter{
    font-family:'Barlow Condensed'; font-weight:800; font-size:15px; color:var(--bg);
    background:var(--accent); border-radius:6px; padding:1px 8px;
  }
  .blockhead h3{margin:0; font-size:18px; text-transform:uppercase;}
  .blockinfo{color:var(--muted); font-size:13px; margin:0 0 10px;}

  .ex{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:8px; overflow:hidden;
  }
  .ex.done{border-color:rgba(116,201,138,.35);}
  .exrow{display:flex; align-items:center; gap:12px; padding:13px 14px; cursor:pointer; min-height:54px;}
  .check{
    min-width:28px; height:28px; border-radius:50%; border:2px solid var(--faint);
    display:flex; align-items:center; justify-content:center; font-size:15px; color:transparent;
    flex-shrink:0;
  }
  .ex.done .check{background:var(--ok); border-color:var(--ok); color:#14110f;}
  .exmain{flex:1; min-width:0;}
  .exname{font-weight:600; font-size:16px;}
  .ex.done .exname{color:var(--muted); text-decoration:line-through; text-decoration-color:var(--ok);}
  .extarget{color:var(--accent); font-size:13px; font-weight:600;}
  .exsub{color:var(--faint); font-size:12.5px;}
  .chev{color:var(--faint); transition:transform .2s;}
  .ex.open .chev{transform:rotate(90deg);}

  .expanel{display:none; padding:0 14px 14px; border-top:1px dashed var(--line);}
  .ex.open .expanel{display:block;}
  .exnote{color:var(--muted); font-size:13.5px; margin:10px 0;}

  .lastperf{
    background:var(--card2); border-radius:10px; padding:8px 12px; margin:10px 0;
    font-size:13px; color:var(--muted);
  }
  .lastperf b{color:var(--ink);}

  /* opcions d'exercici */
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:10px 0;}
  .chip{
    border:1px solid var(--line); background:var(--card2); color:var(--ink);
    border-radius:99px; padding:8px 14px; font-size:14px; font-family:inherit; font-weight:500;
  }
  .chip.sel{background:var(--accent); border-color:var(--accent); color:#14110f; font-weight:600;}
  .otherinput{display:flex; gap:8px; margin:8px 0;}
  .otherinput input{flex:1;}

  /* sèries */
  .sets{margin:10px 0;}
  .setrow{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .setrow .slabel{
    font-family:'Barlow Condensed'; font-weight:700; font-size:15px; color:var(--faint);
    min-width:54px; text-transform:uppercase;
  }
  input[type=text], input[type=tel]{
    background:var(--card2); border:1px solid var(--line); color:var(--ink);
    border-radius:10px; padding:10px 10px; font-size:16px; width:100%; font-family:inherit;
  }
  input:focus{outline:none; border-color:var(--accent);}
  .setrow .unit{color:var(--faint); font-size:13px; min-width:26px;}
  .setrow .del{background:none; border:none; color:var(--faint); font-size:18px; padding:4px 6px;}

  .btn{
    display:block; width:100%; border:none; border-radius:12px; padding:13px;
    font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700;
    text-transform:uppercase; letter-spacing:.06em; cursor:pointer;
  }
  .btn.ghost{background:var(--card2); color:var(--ink); border:1px solid var(--line);}
  .btn.primary{background:var(--accent); color:#14110f;}
  .btn.okbtn{background:var(--ok-soft); color:var(--ok); border:1px solid rgba(116,201,138,.4);}
  .btn.danger{background:none; color:var(--danger); border:1px solid rgba(224,108,90,.35);}
  .btn + .btn{margin-top:8px;}
  .btn.small{padding:9px; font-size:15px;}

  .footactions{margin-top:24px;}
  .backlink{
    background:none; border:none; color:var(--accent); font-family:inherit; font-size:15px;
    font-weight:600; padding:4px 0; margin-bottom:6px;
  }

  /* ---------- historial ---------- */
  .session{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:10px; overflow:hidden;
  }
  .sesshead{display:flex; align-items:center; gap:12px; padding:13px 14px; cursor:pointer;}
  .sessdate{font-family:'Barlow Condensed'; font-weight:700; font-size:15px; color:var(--accent); min-width:64px; text-transform:uppercase; line-height:1.15;}
  .sessmain{flex:1;}
  .sessmain h4{margin:0; font-size:16px;}
  .sessmain .meta{color:var(--faint); font-size:12.5px;}
  .sessbody{display:none; border-top:1px dashed var(--line); padding:10px 14px 14px;}
  .session.open .sessbody{display:block;}
  .histex{margin:9px 0;}
  .histex .hname{font-weight:600; font-size:14.5px;}
  .histex .hsets{color:var(--muted); font-size:13.5px;}
  .empty{color:var(--faint); text-align:center; padding:40px 20px; font-size:14.5px;}
  .empty .big{font-size:40px; margin-bottom:8px;}

  .pill{display:inline-block; background:var(--accent-soft); color:var(--accent); border-radius:99px; padding:2px 9px; font-size:12px; font-weight:600;}
  .toast{
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--bg); padding:10px 18px; border-radius:99px;
    font-size:14px; font-weight:600; z-index:50; opacity:0; transition:opacity .25s; pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

/* ================= ESTAT I EMMAGATZEMATGE ================= */
const KEY='bball-gymlog-v1';
let state={active:null, history:[], lastPerf:{}};
let currentTab='home';
let saveTimer=null;

async function loadState(){
  try{
    const r=await window.storage.get(KEY);
    if(r && r.value){ state=JSON.parse(r.value); }
  }catch(e){ /* primera vegada: no hi ha dades */ }
}
function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{ await window.storage.set(KEY, JSON.stringify(state)); }
    catch(e){ toast('No s\u2019ha pogut desar ⚠️'); }
  },350);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDate(ts){
  const d=new Date(ts);
  const dies=['dg','dl','dt','dc','dj','dv','ds'];
  return dies[d.getDay()]+' '+d.getDate()+'/'+(d.getMonth()+1);
}
function fmtDateLong(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('ca-ES',{weekday:'long', day:'numeric', month:'long'});
}

}
function setHeader(title,sub){
  document.getElementById('pagetitle').textContent=title;
  document.getElementById('pagesub').textContent=sub;
}

/* ================= VISTA: INICI ================= */
function goHome(){
  setTabs('home');
  setHeader('Llibreta de gimnàs','Split de 4 dies — off-season');
  const v=document.getElementById('view');
  let h='';
  if(state.active){
    const day=PROGRAM.find(d=>d.id===state.active.dayId);
    const done=countDone(state.active);
    h+=`<div class="daycard resume" onclick="goWorkout()">
      <div class="dnum">▶</div>
      <div class="dinfo"><h3>Continuar entreno</h3>
      <div class="focus">${esc(day.dia)} · ${done.done}/${done.total} exercicis fets</div></div>
      <div class="arrow">›</div></div>`;
  }
  h+=PROGRAM.map(d=>`
    <div class="daycard" onclick="startDay('${d.id}')">
      <div class="dnum">${d.num}</div>
      <div class="dinfo"><h3>${esc(d.dia)}</h3><div class="focus">${esc(d.titol)} — ${esc(d.focus)}</div></div>
      <div class="arrow">›</div>
    </div>`).join('');
  h+=`<div class="resthint">Dimecres: descans · recuperació activa opcional 🏀</div>`;
  v.innerHTML=h;
}

function startDay(dayId){
  if(state.active && state.active.dayId!==dayId){
    if(!confirm('Tens un entreno en marxa. Vols descartar-lo i començar-ne un de nou?')) return;
    state.active=null;
  }
  if(!state.active){
    state.active={id:'s'+Date.now(), dayId, start:Date.now(), entries:{}};
    saveState();
  }
  goWorkout();
}

/* ================= VISTA: ENTRENO ================= */
function getEntry(itemId){
  if(!state.active.entries[itemId]) state.active.entries[itemId]={variant:null, sets:[], done:false, open:false};
  return state.active.entries[itemId];
}
function countDone(session){
  const day=PROGRAM.find(d=>d.id===session.dayId);
  let total=0, done=0;
  day.blocks.forEach(b=>b.items.forEach(it=>{
    if(it.optional) return;
    total++;
    if(session.entries[it.id] && session.entries[it.id].done) done++;
  }));
  return {total,done};
}
function exDisplayName(item, entry){
  if(item.options){
    return entry.variant ? entry.variant : item.name;
  }
  return item.name;
}
function perfKey(item, entry){
  return (item.options && entry.variant) ? entry.variant : item.name;
}

function goWorkout(){
  if(!state.active){ goHome(); return; }
  setTabs('home');
  const day=PROGRAM.find(d=>d.id===state.active.dayId);
  setHeader(day.dia+' — '+day.num, day.titol);
  const c=countDone(state.active);
  const pct=c.total? Math.round(c.done/c.total*100):0;

  let h=`<button class="backlink" onclick="goHome()">‹ Tornar</button>
  <div class="progresswrap">
    <div class="progressbar"><div style="width:${pct}%"></div></div>
    <div class="progresstxt"><span>${c.done} de ${c.total} exercicis</span><span>${pct}%</span></div>
  </div>`;

  h+=day.blocks.map(b=>{
    const items=b.items.map(it=>renderExercise(it)).join('');
    return `<div class="block">
      <div class="blockhead"><span class="bletter">${b.k}</span><h3>${esc(b.titol)}</h3></div>
      <p class="blockinfo">${esc(b.info)}</p>
      ${items}
    </div>`;
  }).join('');

  h+=`<div class="footactions">
    <button class="btn primary" onclick="finishWorkout()">✓ Acabar i desar l'entreno</button>
    <button class="btn danger" onclick="discardWorkout()">Descartar entreno</button>
  </div>`;

  document.getElementById('view').innerHTML=h;
}

function renderExercise(item){
  const e=getEntry(item.id);
  const name=exDisplayName(item,e);
  const needsChoice=item.options && !e.variant;
  const last=state.lastPerf[perfKey(item,e)];
  let lastHtml='';
  if(last && last.sets && last.sets.length){
    const s=last.sets.map(x=>(x.reps||'?')+(x.weight?('×'+x.weight+'kg'):'')).join(' · ');
    lastHtml=`<div class="lastperf">Última vegada (${fmtDate(last.date)}): <b>${esc(s)}</b></div>`;
  }

  let chipsHtml='';
  if(item.options){
    chipsHtml=`<div class="chips">`+
      item.options.map(o=>`<button class="chip ${e.variant===o?'sel':''}" onclick="event.stopPropagation();pickVariant('${item.id}',this.dataset.o)" data-o="${esc(o)}">${esc(o)}</button>`).join('')+
      `<button class="chip ${e.variant && !item.options.includes(e.variant)?'sel':''}" onclick="event.stopPropagation();showOther('${item.id}')">Altres…</button>
      </div><div id="other-${item.id}" class="otherinput" style="display:none">
        <input type="text" id="otherval-${item.id}" placeholder="Nom de l'exercici">
        <button class="chip" onclick="event.stopPropagation();setOther('${item.id}')">OK</button>
      </div>`;
  }

  let setsHtml='';
  if(!item.nolog){
    setsHtml=`<div class="sets">`+
      e.sets.map((s,i)=>`<div class="setrow">
        <span class="slabel">Sèrie ${i+1}</span>
        <input type="tel" inputmode="numeric" placeholder="reps" value="${esc(s.reps||'')}" onclick="event.stopPropagation()" oninput="updSet('${item.id}',${i},'reps',this.value)">
        <span class="unit">reps</span>
        <input type="tel" inputmode="decimal" placeholder="pes" value="${esc(s.weight||'')}" onclick="event.stopPropagation()" oninput="updSet('${item.id}',${i},'weight',this.value)">
        <span class="unit">kg</span>
        <button class="del" onclick="event.stopPropagation();delSet('${item.id}',${i})">✕</button>
      </div>`).join('')+
      `</div>
      <button class="btn ghost small" onclick="event.stopPropagation();addSet('${item.id}')">+ Afegir sèrie</button>`;
  }

  const doneBtn=`<button class="btn ${e.done?'ghost':'okbtn'} small" style="margin-top:8px" onclick="event.stopPropagation();toggleDone('${item.id}')">${e.done?'Desmarcar':'✓ Marcar com a fet'}</button>`;

  return `<div class="ex ${e.done?'done':''} ${e.open?'open':''}" id="ex-${item.id}">
    <div class="exrow" onclick="toggleOpen('${item.id}')">
      <div class="check" onclick="event.stopPropagation();toggleDone('${item.id}')">✓</div>
      <div class="exmain">
        <div class="exname">${esc(name)}${needsChoice?' <span class="pill">tria exercici</span>':''}</div>
        <div class="extarget">${esc(item.target)}</div>
      </div>
      <div class="chev">›</div>
    </div>
    <div class="expanel">
      ${item.note?`<p class="exnote">${esc(item.note)}</p>`:''}
      ${chipsHtml}
      ${lastHtml}
      ${setsHtml}
      ${doneBtn}
    </div>
  </div>`;
}

/* accions sobre exercicis */
function rerenderEx(itemId){
  // re-render complet de la vista d'entreno mantenint scroll
  const y=window.scrollY;
  goWorkout();
  window.scrollTo(0,y);
}
function toggleOpen(id){ const e=getEntry(id); e.open=!e.open; saveState(); rerenderEx(id); }
function toggleDone(id){
  const e=getEntry(id); e.done=!e.done;
  if(e.done) e.open=false;
  saveState(); rerenderEx(id);
}
function pickVariant(id,name){ const e=getEntry(id); e.variant=name; saveState(); rerenderEx(id); }
function showOther(id){
  const el=document.getElementById('other-'+id);
  el.style.display='flex';
  document.getElementById('otherval-'+id).focus();
}
function setOther(id){
  const v=document.getElementById('otherval-'+id).value.trim();
  if(!v) return;
  const e=getEntry(id); e.variant=v; saveState(); rerenderEx(id);
}
function addSet(id){
  const e=getEntry(id);
  const prev=e.sets[e.sets.length-1];
  e.sets.push({reps:prev?prev.reps:'', weight:prev?prev.weight:''});
  if(!e.open) e.open=true;
  saveState(); rerenderEx(id);
}
function updSet(id,i,field,val){
  const e=getEntry(id);
  if(e.sets[i]){ e.sets[i][field]=val; saveState(); }
}
function delSet(id,i){
  const e=getEntry(id); e.sets.splice(i,1); saveState(); rerenderEx(id);
}

/* acabar / descartar */
function finishWorkout(){
  const c=countDone(state.active);
  if(c.done===0 && !confirm('No has marcat cap exercici. Vols desar igualment?')) return;
  const s=state.active;
  s.end=Date.now();
  // actualitza últims registres per exercici
  const day=PROGRAM.find(d=>d.id===s.dayId);
  day.blocks.forEach(b=>b.items.forEach(it=>{
    const e=s.entries[it.id];
    if(e && e.sets && e.sets.some(x=>x.reps||x.weight)){
      state.lastPerf[perfKey(it,e)]={sets:e.sets.filter(x=>x.reps||x.weight), date:s.end};
    }
  }));
  state.history.unshift(s);
  state.active=null;
  saveState();
  toast('Entreno desat 💪');
  goHist();
}
function discardWorkout(){
  if(!confirm('Segur que vols descartar aquest entreno? No es desarà res.')) return;
  state.active=null; saveState(); goHome();
}

/* ================= VISTA: HISTORIAL ================= */
function goHist(){
  setTabs('hist');
  setHeader('Historial','La teva llibreta d\u2019entrenos');
  const v=document.getElementById('view');
  if(!state.history.length){
    v.innerHTML=`<div class="empty"><div class="big">📓</div>Encara no tens cap entreno desat.<br>Quan acabis el primer, apareixerà aquí.</div>`;
    return;
  }
  v.innerHTML=state.history.map((s,idx)=>{
    const day=PROGRAM.find(d=>d.id===s.dayId);
    const c=countDone(s);
    const mins=s.end?Math.round((s.end-s.start)/60000):null;
    return `<div class="session" id="sess-${idx}">
      <div class="sesshead" onclick="toggleSess(${idx})">
        <div class="sessdate">${fmtDate(s.start)}</div>
        <div class="sessmain"><h4>${esc(day.dia)} · ${esc(day.titol)}</h4>
          <div class="meta">${c.done}/${c.total} exercicis${mins?` · ${mins} min`:''}</div></div>
        <div class="chev">›</div>
      </div>
      <div class="sessbody">
        <div class="meta" style="color:var(--faint);font-size:12.5px;margin-bottom:4px">${esc(fmtDateLong(s.start))}</div>
        ${renderSessDetail(s,day)}
        <button class="btn danger small" style="margin-top:10px" onclick="delSession(${idx})">Esborrar aquest entreno</button>
      </div>
    </div>`;
  }).join('');
}
function renderSessDetail(s,day){
  let h='';
  day.blocks.forEach(b=>{
    b.items.forEach(it=>{
      const e=s.entries[it.id];
      if(!e) return;
      const hasSets=e.sets && e.sets.some(x=>x.reps||x.weight);
      if(!e.done && !hasSets && !e.variant) return;
      const name=exDisplayName(it,e);
      let sets='';
      if(hasSets){
        sets=e.sets.filter(x=>x.reps||x.weight).map(x=>(x.reps||'?')+' reps'+(x.weight?(' × '+x.weight+' kg'):'')).join('  ·  ');
      }else if(e.done){
        sets='Fet ✓';
      }
      h+=`<div class="histex"><div class="hname">${e.done?'✓ ':''}${esc(name)} <span style="color:var(--faint);font-weight:400">(${b.k})</span></div>
        ${sets?`<div class="hsets">${esc(sets)}</div>`:''}</div>`;
    });
  });
  return h || '<div class="hsets">Cap registre en aquest entreno.</div>';
}
function toggleSess(i){
  document.getElementById('sess-'+i).classList.toggle('open');
}
function delSession(i){
  if(!confirm('Segur que vols esborrar aquest entreno de l\u2019historial?')) return;
  state.history.splice(i,1);
  saveState(); goHist();
  toast('Entreno esborrat');
}

/* ================= INICI ================= */
(async function(){
  await loadState();
  if(state.active) goWorkout(); else goHome();
})();
</script>
</body>
